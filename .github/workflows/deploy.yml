name: Deploy to Cloudflare Workers

# Po każdym pushu na main wywołuje Deploy Hook Cloudflare (sekret CF_DEPLOY_HOOK).
# Hook uruchamia build po stronie Cloudflare Workers Builds — te same komendy
# i token co przy integracji git, ale bez zależności od webhooka GitHub->CF.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Call Cloudflare deploy hook
        env:
          HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::Brak sekretu CF_DEPLOY_HOOK — dodaj go w Settings -> Secrets and variables -> Actions"
            exit 1
          fi
          code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" -X POST "$HOOK")
          echo "Cloudflare odpowiedział: HTTP $code"
          cat /tmp/resp.txt
          [ "$code" -ge 200 ] && [ "$code" -lt 300 ]
